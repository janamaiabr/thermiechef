name: Daily recipe publish

"on":
  schedule:
    # 19:00 UTC = 5:00 AM Australia/Brisbane
    - cron: '0 19 * * *'
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: daily-recipe-publish
  cancel-in-progress: false

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          persist-credentials: true

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Rebuild dated recipes
        run: node scripts/build.mjs
        env:
          SITE_URL: https://thermiechef.com.au

      - name: Validate SEO, LLM and recipe safety
        run: node scripts/validate-site.mjs
        env:
          SITE_URL: https://thermiechef.com.au

      - name: Commit and push when a recipe goes live
        run: |
          git config user.name "ThermieChef Bot"
          git config user.email "bot@users.noreply.github.com"
          git add -A
          if git diff --cached --quiet; then
            echo "No dated recipe to publish today."
          else
            git commit -m "Publish daily recipe ($(date -u +%F))"
            git push
          fi

      - name: Queue status
        run: |
          REMAINING=$(node scripts/queue-status.mjs)
          echo "Recipes still queued: $REMAINING"
          if [ "$REMAINING" -le 14 ]; then
            echo "::warning::ThermieChef recipe queue is low ($REMAINING recipes remaining). Add more recipes/data/*.json files."
          fi
